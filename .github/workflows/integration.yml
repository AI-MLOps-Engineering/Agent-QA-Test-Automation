name: Integration Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:24-dind
        options: >-
          --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install docker compose plugin
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin

      - name: Build and start services
        run: |
          docker compose up -d --build
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:8000/health >/dev/null 2>&1; then
              echo "API healthy"
              break
            fi
            echo "Waiting for API..."
            sleep 2
          done

      - name: Create analysis in API container and export ANALYSIS_ID
        id: create_analysis
        run: |
          # create an analysis inside the api container and print the id
          docker compose exec api sh -c "python - <<'PY'
import asyncio, json, sys
from app.core.orchestrator import Orchestrator
orch = Orchestrator.from_settings()
async def run():
    analysis_id, summary = await orch.analyze_repo('/app', entrypoint=None)
    print(analysis_id)
asyncio.run(run())
PY" > analysis_id.txt
          ANALYSIS_ID=$(cat analysis_id.txt)
          echo "ANALYSIS_ID=$ANALYSIS_ID" >> $GITHUB_ENV
          echo "Created analysis: $ANALYSIS_ID"

      - name: Run integration script (bash fallback)
        env:
          API_BASE: "http://localhost:8000"
          ANALYSIS_ID: ${{ env.ANALYSIS_ID }}
        run: |
          set -euo pipefail
          echo "Using ANALYSIS_ID=$ANALYSIS_ID"
          PAYLOAD=$(jq -n --arg a "$ANALYSIS_ID" '{analysis_id:$a, target:"all", coverage_goal:0.8}')
          RESP=$(curl -sS -X POST -H "Content-Type: application/json" -d "$PAYLOAD" http://localhost:8000/api/generate-tests)
          echo "$RESP" | jq .
          TESTS_ID=$(echo "$RESP" | jq -r .tests_id)
          if [ -z "$TESTS_ID" ] || [ "$TESTS_ID" = "null" ]; then
            echo "generate-tests failed"; exit 1
          fi
          PAYLOAD_RUN=$(jq -n --arg t "$TESTS_ID" '{tests_id:$t, timeout_seconds:600}')
          RUN_RESP=$(curl -sS -X POST -H "Content-Type: application/json" -d "$PAYLOAD_RUN" http://localhost:8000/api/run-tests)
          echo "$RUN_RESP" | jq .
          RUN_ID=$(echo "$RUN_RESP" | jq -r .run_id)
          for i in $(seq 1 60); do
            REPORT=$(curl -sS http://localhost:8000/api/report/$RUN_ID || true)
            if echo "$REPORT" | jq -e . >/dev/null 2>&1; then
              echo "Run finished"
              echo "$REPORT" | jq .
              break
            fi
            sleep 2
          done

      - name: Collect API logs on failure
        if: failure()
        run: |
          docker compose logs --no-color --tail 200 > api_logs.txt

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-logs
          path: api_logs.txt

      - name: Tear down
        if: always()
        run: docker compose down -v
