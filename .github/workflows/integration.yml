name: Integration Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:24-dind
        options: >-
          --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker CLI (includes compose)
        uses: docker/setup-docker@v4
        with:
          docker-ce-version: "24.0.0" # optionnel, adapte si besoin

      - name: Build and start services
        run: |
          docker compose up -d --build
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:8000/health >/dev/null 2>&1; then
              echo "API healthy"
              break
            fi
            echo "Waiting for API..."
            sleep 2
          done

      - name: Create analysis in API container and export ANALYSIS_ID
        id: create_analysis
        run: |
          echo "Creating analysis inside API container..."
          # Run a one-liner Python inside the api service to create the analysis and print the id.
          # Use docker compose run --rm to avoid nested heredocs and quoting issues.
          ANALYSIS_ID=$(docker compose run --rm api python -c "import asyncio; from app.core.orchestrator import Orchestrator; orch=Orchestrator.from_settings(); aid, _ = asyncio.run(orch.analyze_repo('/app', entrypoint=None)); print(aid)")
          echo "ANALYSIS_ID=$ANALYSIS_ID" >> $GITHUB_ENV
          echo "Created analysis: $ANALYSIS_ID"

      - name: Run integration script (bash fallback)
        env:
          API_BASE: "http://localhost:8000"
          ANALYSIS_ID: ${{ env.ANALYSIS_ID }}
        run: |
          set -euo pipefail
          echo "Using ANALYSIS_ID=$ANALYSIS_ID"
          PAYLOAD=$(jq -n --arg a "$ANALYSIS_ID" '{analysis_id:$a, target:"all", coverage_goal:0.8}')
          RESP=$(curl -sS -X POST -H "Content-Type: application/json" -d "$PAYLOAD" http://localhost:8000/api/generate-tests)
          echo "$RESP" | jq .
          TESTS_ID=$(echo "$RESP" | jq -r .tests_id)
          if [ -z "$TESTS_ID" ] || [ "$TESTS_ID" = "null" ]; then
            echo "generate-tests failed"; exit 1
          fi
          PAYLOAD_RUN=$(jq -n --arg t "$TESTS_ID" '{tests_id:$t, timeout_seconds:600}')
          RUN_RESP=$(curl -sS -X POST -H "Content-Type: application/json" -d "$PAYLOAD_RUN" http://localhost:8000/api/run-tests)
          echo "$RUN_RESP" | jq .
          RUN_ID=$(echo "$RUN_RESP" | jq -r .run_id)
          for i in $(seq 1 60); do
            REPORT=$(curl -sS http://localhost:8000/api/report/$RUN_ID || true)
            if echo "$REPORT" | jq -e . >/dev/null 2>&1; then
              echo "Run finished"
              echo "$REPORT" | jq .
              break
            fi
            sleep 2
          done

      - name: Collect API logs on failure
        if: failure()
        run: |
          docker compose logs --no-color --tail 200 > api_logs.txt

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-logs
          path: api_logs.txt

      - name: Tear down
        if: always()
        run: docker compose down -v
